name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: "quan-portal-scene-demo/package-lock.json"

      - name: Install dependencies
        run: cd quan-portal-scene-demo && npm install

      - name: Build project
        run: cd quan-portal-scene-demo && npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./quan-portal-scene-demo/dist
          cname: ""
